x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    mem_limit: 300M
    networks:
      - florist-internal
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=64M
      - --max-connections=30
      - --performance-schema=0
      - --skip-log-bin
    volumes:
      - mysql-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5

  ai-agent:
    image: ${SERVER_IMAGE}-agent:${IMAGE_TAG}
    restart: unless-stopped
    stop_grace_period: 45s
    logging: *default-logging
    mem_limit: 256M
    networks:
      - florist-internal
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${AI_PROXY_API_KEY}
      - OPENAI_BASE_URL=${AI_PROXY_BASE_URL}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - SQLITE_PATH=/app/data/florist_agent.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - API_KEY=${AI_AGENT_API_KEY}
      - LOG_LEVEL=WARNING
      - PYTHONOPTIMIZE=2
    volumes:
      - agent-data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 100M
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  server:
    image: ${SERVER_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    mem_limit: 256M
    networks:
      - florist-internal
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=192
      PORT: 3000
      GLOBAL_PREFIX: ${GLOBAL_PREFIX}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?connection_limit=5
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY}
      DATABASE_SSL_ENABLED: 'false'
      BACKUP_CRON: ${BACKUP_CRON}
      BACKUP_DIR: ${BACKUP_DIR}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      AI_PROXY_BASE_URL: ${AI_PROXY_BASE_URL}
      AI_PROXY_API_KEY: ${AI_PROXY_API_KEY}
      AI_PROXY_MODEL: ${AI_PROXY_MODEL}
      AI_AGENT_URL: ${AI_AGENT_URL}
      AI_AGENT_API_KEY: ${AI_AGENT_API_KEY}
      AI_DAILY_QUOTA: ${AI_DAILY_QUOTA}
      AI_CACHE_TTL_MS: ${AI_CACHE_TTL_MS}
      WEATHER_CACHE_TTL_MS: ${WEATHER_CACHE_TTL_MS}
      IMAGE_CACHE_TTL_MS: ${IMAGE_CACHE_TTL_MS}
      REQUEST_LOG_RETENTION_DAYS: ${REQUEST_LOG_RETENTION_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_SESSION_TTL_MS: ${ADMIN_SESSION_TTL_MS}
      H5_LOGIN_PHONE: ${H5_LOGIN_PHONE}
      H5_LOGIN_CODE: ${H5_LOGIN_CODE}
      H5_LOGIN_NICKNAME: ${H5_LOGIN_NICKNAME}
      WECHAT_MINI_PROGRAM_APP_ID: ${WECHAT_MINI_PROGRAM_APP_ID}
      WECHAT_MINI_PROGRAM_SECRET: ${WECHAT_MINI_PROGRAM_SECRET}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE}
      APP_LOG_LEVELS: ${APP_LOG_LEVELS}
      EXPOSE_INTERNAL_ERROR_DETAILS: 'false'
    volumes:
      - server-uploads:/workspace/apps/server/var/uploads
      - server-backups:/workspace/apps/server/var/backups
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/${GLOBAL_PREFIX}/health')
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  client:
    image: ${CLIENT_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64M
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${CLIENT_HTTP_PORT}:80'
    networks:
      - florist-public
      - florist-internal
    # Override nginx worker_processes to 1 for low-resource server
    command: sh -c "sed -i 's/worker_processes  *auto;/worker_processes 1;/' /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  mysql-data:
  server-uploads:
  server-backups:
  agent-data:

networks:
  florist-public:
  florist-internal:
    internal: true
