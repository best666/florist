services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=100
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: ${SERVER_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      GLOBAL_PREFIX: ${GLOBAL_PREFIX}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?connection_limit=10
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY}
      DATABASE_SSL_ENABLED: 'false'
      BACKUP_CRON: ${BACKUP_CRON}
      BACKUP_DIR: ${BACKUP_DIR}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      AI_PROXY_BASE_URL: ${AI_PROXY_BASE_URL}
      AI_PROXY_API_KEY: ${AI_PROXY_API_KEY}
      AI_PROXY_MODEL: ${AI_PROXY_MODEL}
      AI_DAILY_QUOTA: ${AI_DAILY_QUOTA}
      AI_CACHE_TTL_MS: ${AI_CACHE_TTL_MS}
      WEATHER_CACHE_TTL_MS: ${WEATHER_CACHE_TTL_MS}
      IMAGE_CACHE_TTL_MS: ${IMAGE_CACHE_TTL_MS}
      REQUEST_LOG_RETENTION_DAYS: ${REQUEST_LOG_RETENTION_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_SESSION_TTL_MS: ${ADMIN_SESSION_TTL_MS}
      H5_LOGIN_PHONE: ${H5_LOGIN_PHONE}
      H5_LOGIN_CODE: ${H5_LOGIN_CODE}
      H5_LOGIN_NICKNAME: ${H5_LOGIN_NICKNAME}
      WECHAT_MINI_PROGRAM_APP_ID: ${WECHAT_MINI_PROGRAM_APP_ID}
      WECHAT_MINI_PROGRAM_SECRET: ${WECHAT_MINI_PROGRAM_SECRET}
      APP_LOG_LEVELS: ${APP_LOG_LEVELS}
      EXPOSE_INTERNAL_ERROR_DETAILS: 'false'
    volumes:
      - server-uploads:/workspace/apps/server/var/uploads
      - server-backups:/workspace/apps/server/var/backups
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/${GLOBAL_PREFIX}/health')
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10

  client:
    image: ${CLIENT_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${CLIENT_HTTP_PORT}:80'

volumes:
  mysql-data:
  server-uploads:
  server-backups:
