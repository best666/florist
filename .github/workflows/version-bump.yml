name: version-bump

# Push to main 时自动递增版本号
# 版本号格式: 0.1.x (patch 自动 +1)
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: '版本递增类型'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # 跳过版本号自动递增 commit 和 release tag commit
    if: |
      !contains(github.event.head_commit.message, '[skip bump]') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ inputs.bump_type || 'patch' }}"
          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "📦 Version bumped: $OLD_VERSION → $NEW_VERSION ($BUMP_TYPE)"

      - name: Commit and push
        run: |
          git add package.json
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }} [skip bump]"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"
          echo "🚀 Released v${{ steps.bump.outputs.new_version }}"
