name: sync-base-images

# 每周同步基础镜像到 GHCR，加速 CD 构建
# CD build-images 中不再从 Docker Hub 拉取，改为从 GHCR 拉取（同机房、高速、不受 Docker Hub 限流）

on:
  schedule:
    # 每周日 03:17 UTC（避开整点高峰）
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        image:
          - node:20-bookworm-slim
          - python:3.11-slim
          - nginx:1.27-alpine

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync ${{ matrix.image }} to GHCR
        run: |
          set -euo pipefail
          SOURCE="${{ matrix.image }}"
          TARGET="ghcr.io/${{ github.repository_owner }}/${SOURCE}"
          echo "Pulling ${SOURCE} from Docker Hub..."
          docker pull "${SOURCE}"
          echo "Tagging as ${TARGET}..."
          docker tag "${SOURCE}" "${TARGET}"
          echo "Pushing to GHCR..."
          docker push "${TARGET}"
          echo "✓ Synced ${SOURCE} → ${TARGET}"
