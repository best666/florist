name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: florist-production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.image_tag.outputs.value }}
      registry_owner: ${{ steps.registry_owner.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: image_tag
        run: echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve registry owner
        id: registry_owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-server:${{ steps.image_tag.outputs.value }}
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-server:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/client/Dockerfile
          push: true
          build-args: |
            VITE_APP_PUBLIC_BASE=/
            VITE_SERVER_BASEURL=/api
            VITE_APP_PROXY_ENABLE=false
            VITE_DELETE_CONSOLE=true
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-client:${{ steps.image_tag.outputs.value }}
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-client:latest

      - name: Build and push AI agent image
        uses: docker/build-push-action@v6
        with:
          context: services/ai-agent
          file: services/ai-agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-server-agent:${{ steps.image_tag.outputs.value }}
            ghcr.io/${{ steps.registry_owner.outputs.value }}/florist-server-agent:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/*
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_DEPLOY_USERNAME: ${{ secrets.GHCR_DEPLOY_USERNAME }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY_OWNER: ${{ needs.build-and-push.outputs.registry_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,GHCR_DEPLOY_USERNAME,GHCR_DEPLOY_TOKEN,IMAGE_TAG,REGISTRY_OWNER
          script: |
            set -eu
            cd "$DEPLOY_PATH/deploy"
            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_PATH/deploy/.env on target server."
              exit 1
            fi
            echo "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u "$GHCR_DEPLOY_USERNAME" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" sh ./redeploy.sh
