name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: florist-production-deploy
  cancel-in-progress: false

jobs:
  # 预检查 MySQL 镜像是否已在 GHCR 中存在，避免每次都从 Docker Hub 拉取
  check-mysql-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      needs_mirror: ${{ steps.check.outputs.needs_mirror }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if MySQL image exists in GHCR
        id: check
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/mysql"
          if docker manifest inspect "${REPO}:8.4" >/dev/null 2>&1; then
            echo "MySQL 8.4 already exists in GHCR, skipping mirror."
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
          else
            echo "MySQL 8.4 not found in GHCR, will mirror."
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          fi

  mirror-mysql:
    needs: check-mysql-mirror
    if: needs.check-mysql-mirror.outputs.needs_mirror == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror MySQL image to GHCR
        run: |
          docker pull mysql:8.4
          docker tag mysql:8.4 ghcr.io/${{ github.repository_owner }}/mysql:8.4
          docker push ghcr.io/${{ github.repository_owner }}/mysql:8.4

  build-images:
    needs: check-mysql-mirror
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      image_tag: ${{ steps.image_tag.outputs.value }}
      registry_owner: ${{ steps.registry_owner.outputs.value }}
    strategy:
      matrix:
        include:
          - name: server
            file: apps/server/Dockerfile
            context: .
            image-suffix: florist-server
            has-build-args: false
          - name: client
            file: apps/client/Dockerfile
            context: .
            image-suffix: florist-client
            has-build-args: true
            build-args: |
              VITE_APP_PUBLIC_BASE=/
              VITE_SERVER_BASEURL=/api
              VITE_APP_PROXY_ENABLE=false
              VITE_DELETE_CONSOLE=true
          - name: agent
            file: services/ai-agent/Dockerfile
            context: services/ai-agent
            image-suffix: florist-server-agent
            has-build-args: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: image_tag
        run: echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve registry owner
        id: registry_owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base images (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "[Attempt $attempt/3] Pulling base images..."
            if docker pull python:3.11-slim 2>/dev/null && \
               docker pull node:20-bookworm-slim 2>/dev/null && \
               docker pull nginx:1.27-alpine 2>/dev/null; then
              echo "Base images pulled successfully."
              exit 0
            fi
            echo "Pull failed, waiting 15s before retry..."
            sleep 15
          done
          echo "WARNING: Could not pull all base images, build may be slower."
        continue-on-error: true

      - name: Build and push ${{ matrix.name }} image
        if: matrix.has-build-args == false
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.value }}/${{ matrix.image-suffix }}:${{ steps.image_tag.outputs.value }}
            ghcr.io/${{ steps.registry_owner.outputs.value }}/${{ matrix.image-suffix }}:latest

      - name: Build and push ${{ matrix.name }} image (with build-args)
        if: matrix.has-build-args == true
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build-args }}
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.value }}/${{ matrix.image-suffix }}:${{ steps.image_tag.outputs.value }}
            ghcr.io/${{ steps.registry_owner.outputs.value }}/${{ matrix.image-suffix }}:latest

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/*
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_DEPLOY_USERNAME: ${{ secrets.GHCR_DEPLOY_USERNAME }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          REGISTRY_OWNER: ${{ needs.build-images.outputs.registry_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,GHCR_DEPLOY_USERNAME,GHCR_DEPLOY_TOKEN,IMAGE_TAG,REGISTRY_OWNER
          script: |
            set -eu
            cd "$DEPLOY_PATH/deploy"
            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_PATH/deploy/.env on target server."
              exit 1
            fi
            echo "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u "$GHCR_DEPLOY_USERNAME" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" sh ./redeploy.sh
