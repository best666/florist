name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: pnpm 已使用 pnpm store path 机制缓存，无需额外 actions/cache
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @florist/contracts build

      - name: Generate Prisma client
        run: pnpm --filter @florist/server prisma:generate

      # typecheck、server build、client build 并行执行，输出分流便于排查
      - name: Typecheck and build (parallel)
        env:
          VITE_APP_PUBLIC_BASE: /
          VITE_SERVER_BASEURL: /api
          VITE_APP_PROXY_ENABLE: 'false'
          VITE_DELETE_CONSOLE: 'true'
        run: |
          set -e
          FAIL=0

          pnpm typecheck > /tmp/ci-typecheck.log 2>&1 &
          PID_TC=$!

          pnpm --filter @florist/server build > /tmp/ci-server-build.log 2>&1 &
          PID_SRV=$!

          pnpm --filter @florist/client build:h5 > /tmp/ci-client-build.log 2>&1 &
          PID_CLI=$!

          wait $PID_TC || { echo "=== typecheck failed ==="; cat /tmp/ci-typecheck.log; FAIL=1; }
          wait $PID_SRV || { echo "=== server build failed ==="; cat /tmp/ci-server-build.log; FAIL=1; }
          wait $PID_CLI || { echo "=== client build failed ==="; cat /tmp/ci-client-build.log; FAIL=1; }

          exit $FAIL
