name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @florist/contracts build

      - name: Generate Prisma client
        run: pnpm --filter @florist/server prisma:generate

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build server
        run: pnpm --filter @florist/server build

      - name: Build client H5
        env:
          VITE_APP_PUBLIC_BASE: /
          VITE_SERVER_BASEURL: /api
          VITE_APP_PROXY_ENABLE: 'false'
          VITE_DELETE_CONSOLE: 'true'
        run: pnpm --filter @florist/client build:h5
