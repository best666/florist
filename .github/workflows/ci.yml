name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @florist/contracts build

      - name: Generate Prisma client
        run: pnpm --filter @florist/server prisma:generate

      # typecheck、server build、client build 并行执行，互不依赖
      - name: Typecheck and build (parallel)
        env:
          VITE_APP_PUBLIC_BASE: /
          VITE_SERVER_BASEURL: /api
          VITE_APP_PROXY_ENABLE: 'false'
          VITE_DELETE_CONSOLE: 'true'
        run: |
          set -e
          FAIL=0

          pnpm typecheck &
          PID_TC=$!

          pnpm --filter @florist/server build &
          PID_SRV=$!

          pnpm --filter @florist/client build:h5 &
          PID_CLI=$!

          wait $PID_TC || { echo "typecheck failed"; FAIL=1; }
          wait $PID_SRV || { echo "server build failed"; FAIL=1; }
          wait $PID_CLI || { echo "client build failed"; FAIL=1; }

          exit $FAIL
