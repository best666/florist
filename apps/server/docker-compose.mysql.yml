services:
  mysql:
    image: mysql:8.4
    container_name: florist-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: florist
      MYSQL_USER: florist
      MYSQL_PASSWORD: florist123
      MYSQL_ROOT_PASSWORD: root123456
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot123456']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
